<section id="tech-stack" class="tech-stack py-5">

  <div class="container">

    <h2 class="text-center mb-5">Tech Stack</h2>

    <div class="row g-4">

      @for (technology of technologies; track technology.name) {

        <div class="col-md-6 col-lg-3">

          <div class="card tech-card h-100">

            <div class="card-body text-center">

              <div class="icon">
                {{ technology.icon }}
              </div>

              <h4 class="mt-3">
                {{ technology.name }}
              </h4>

              <p class="text-secondary">
                {{ technology.description }}
              </p>

            </div>

          </div>

        </div>

      }

    </div>

  </div>

</section>
