<section class="featured-projects py-5">

  <div class="container">

    <h2 class="text-center mb-5">

      Featured Projects

    </h2>

    <div class="row g-4">

      @for (project of projects; track project.title) {

        <div class="col-md-6 col-xl-4">

          <app-project-card
            [project]="project">
          </app-project-card>

        </div>

      }

    </div>

  </div>

</section>
